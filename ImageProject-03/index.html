<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Abandoned Observatory</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>

    <a-scene>

      <a-sky color="#0a0520"></a-sky>

      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="40"
        height="40"
        color="#1a2e14">
      </a-plane>


      <a-cylinder
        position="0 1.8 -4"
        rotation="30 0 0"
        radius="0.15"
        height="2"
        color="#8a7a60">
      </a-cylinder>

      <a-cylinder
        position="0 0.8 -4"
        radius="0.08"
        height="1.2"
        color="#6a5a40">
      </a-cylinder>

      <a-cylinder
        position="0 0.2 -4"
        radius="0.3"
        height="0.08"
        color="#5a4a30">
      </a-cylinder>

  

      <a-torus
        position="3 1.2 -3"
        rotation="0 0 0"
        radius="0.6"
        radius-tubular="0.02"
        color="#c0a060">

        <a-animation
          attribute="rotation"
          from="0 0 0"
          to="0 360 0"
          dur="20000"
          repeat="indefinite"
          easing="linear">
        </a-animation>
      </a-torus>

      <a-torus
        position="3 1.2 -3"
        rotation="90 0 0"
        radius="0.58"
        radius-tubular="0.02"
        color="#b09050">
      </a-torus>

      <a-torus
        position="3 1.2 -3"
        rotation="90 0 45"
        radius="0.56"
        radius-tubular="0.02"
        color="#a08040">
      </a-torus>

      <a-sphere
        position="3 1.2 -3"
        radius="0.12"
        color="#2a4a6e">
      </a-sphere>

      <a-cylinder
        position="3 0.5 -3"
        radius="0.06"
        height="0.8"
        color="#8a7a60">
      </a-cylinder>

      <a-cylinder
        position="0 0.6 -8"
        radius="3"
        height="1.2"
        color="#3a3228">
      </a-cylinder>

      <a-sphere
        position="0 1.8 -8"
        radius="3"
        phi-start="0"
        phi-length="180"
        color="#2c2820">
      </a-sphere>

    
      <a-cylinder
        position="-3 0.05 -2"
        rotation="0 0 90"
        radius="0.05"
        height="0.7"
        color="#3d2010">
      </a-cylinder>
      <a-cylinder
        position="-3 0.05 -2"
        rotation="0 60 90"
        radius="0.05"
        height="0.7"
        color="#3d2010">
      </a-cylinder>

      <a-cone
        position="-3 0.3 -2"
        radius-bottom="0.12"
        radius-top="0.01"
        height="0.4"
        color="#ff6820"
        material="shader: flat">
        <a-animation
          attribute="scale"
          from="1 1 1"
          to="0.85 1.2 0.85"
          dur="500"
          direction="alternate"
          repeat="indefinite"
          easing="easeInOutSine">
        </a-animation>
      </a-cone>

      <a-light
        type="point"
        color="#ff8030"
        intensity="1.2"
        distance="6"
        position="-3 0.5 -2">
      </a-light>

     
      <a-light type="directional" color="#8899cc" intensity="0.4" position="-5 10 -5"></a-light>

      <a-light type="ambient" color="#111122" intensity="1"></a-light>

 

      <a-sphere position="10 15 -30"  radius="0.08" color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="-15 20 -40" radius="0.1"  color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="5 25 -50"   radius="0.07" color="#aac0ff" material="shader:flat"></a-sphere>
      <a-sphere position="-8 18 -35"  radius="0.09" color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="20 22 -45"  radius="0.06" color="#ffdda8" material="shader:flat"></a-sphere>
      <a-sphere position="-20 28 -50" radius="0.1"  color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="12 30 -55"  radius="0.08" color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="-5 35 -60"  radius="0.09" color="#aac0ff" material="shader:flat"></a-sphere>
      <a-sphere position="25 18 -40"  radius="0.07" color="#ffffff" material="shader:flat"></a-sphere>
      <a-sphere position="-25 22 -45" radius="0.08" color="#ffdda8" material="shader:flat"></a-sphere>

   

      <a-entity position="0 1.6 4">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

    </a-scene>

  </body>
</html>
